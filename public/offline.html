<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - ezLegal.ai</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f8fafc; color: #1e293b; padding: 2rem; }
    .container { text-align: center; max-width: 420px; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
    p { color: #64748b; line-height: 1.6; margin-bottom: 1.5rem; }
    button { background: #0f766e; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-size: 1rem; cursor: pointer; }
    button:hover { background: #115e59; }
  </style>
</head>
<body>
  <div class="container">
    <h1>You're offline</h1>
    <p>It looks like your internet connection dropped. Please check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
