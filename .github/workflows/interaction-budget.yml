name: Interaction Budget Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  BUDGET_PORT: 4173

jobs:
  interaction-budget:
    name: UX Interaction Budget
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright (if not in deps)
        run: |
          if ! npm ls playwright >/dev/null 2>&1; then
            npm i -D playwright
          fi

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: cache-playwright
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build application
        run: npm run build

      - name: Run interaction budget tests
        run: npm run test:interaction-budget
        env:
          BUDGET_PORT: ${{ env.BUDGET_PORT }}
          REPORT_DIR: ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: interaction-budget-report
          path: test-results/
          retention-days: 30

      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'test-results/interaction-budget-summary.txt';

            if (fs.existsSync(reportPath)) {
              const summary = fs.readFileSync(reportPath, 'utf8');
              const body = `## Interaction Budget Test Results\n\n\`\`\`\n${summary}\n\`\`\``;

              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  interaction-budget-desktop:
    name: Desktop Budget (standalone)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: |
          npm i -D playwright
          npx playwright install chromium --with-deps

      - name: Build application
        run: npm run build

      - name: Run desktop interaction budget test
        run: npm run test:interaction-budget:desktop

  interaction-budget-mobile:
    name: Mobile Budget (standalone)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: |
          npm i -D playwright
          npx playwright install chromium --with-deps

      - name: Build application
        run: npm run build

      - name: Run mobile interaction budget test
        run: npm run test:interaction-budget:mobile
