name: Conformance Gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run conformance validation
        run: npm run conformance:check

      - name: Generate conformance report
        run: npm run conformance:report
        if: always()

      - name: Upload conformance reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conformance-reports
          path: reports/conformance/
          retention-days: 30

      - name: Comment PR with conformance summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const reportPath = 'reports/conformance/route-policy-dashboard.md';
            if (!fs.existsSync(reportPath)) {
              console.log('No report found, skipping comment');
              return;
            }

            const report = fs.readFileSync(reportPath, 'utf8');

            const summaryMatch = report.match(/## Executive Summary[\s\S]*?(?=##|$)/);
            if (!summaryMatch) {
              console.log('No summary found in report');
              return;
            }

            const summary = summaryMatch[0].trim();

            const body = `## Conformance Report

            ${summary}

            <details>
            <summary>View full report</summary>

            ${report}

            </details>

            ---
            *Generated by conformance workflow*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('## Conformance Report')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
